services:
  app:
    build:
      context: ../
      dockerfile: .docker/Dockerfile.java
      target: dev
    ports:
      - "8080:8080"
    volumes:
      - ../:/app
    working_dir: /app
    stdin_open: true
    tty: true
    env_file:
      - ../.env
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JAVA_ENV=development
